<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BALENCIAGA — CHAT</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050505;
      --surface: #0d0d0d;
      --border: #1a1a1a;
      --border2: #242424;
      --muted: #444;
      --muted2: #666;
      --input-bg: #0a0a0a;
    }

    html, body { height: 100%; background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; overflow: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.3;
    }

    .app {
      display: flex; flex-direction: column; height: 100vh;
      max-width: 720px; margin: 0 auto;
      border-left: 1px solid var(--border); border-right: 1px solid var(--border);
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; background: var(--bg);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.22em;
      background: linear-gradient(180deg, #fff 0%, #666 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .header-right { display: flex; align-items: center; gap: 8px; font-size: 8px; letter-spacing: 0.3em; color: var(--muted2); text-transform: uppercase; }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 6px #4caf50; animation: blink 2s ease-in-out infinite; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* NAME GATE */
    #name-gate {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 32px; gap: 0;
    }

    .gate-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 0.2em; margin-bottom: 6px; }
    .gate-sub { font-size: 9px; letter-spacing: 0.4em; color: var(--muted2); text-transform: uppercase; margin-bottom: 32px; }
    .gate-error { font-size: 9px; letter-spacing: 0.2em; color: #c0392b; min-height: 1em; margin-bottom: 8px; }

    .gate-input {
      width: 100%; max-width: 300px;
      background: var(--input-bg); border: 1px solid var(--border2);
      color: #fff; font-family: 'Space Mono', monospace; font-size: 13px;
      padding: 13px 16px; outline: none; text-align: center; margin-bottom: 10px;
      transition: border-color 0.2s; letter-spacing: 0.1em;
    }
    .gate-input::placeholder { color: var(--muted); }
    .gate-input:focus { border-color: #333; }

    .gate-btn {
      width: 100%; max-width: 300px; background: #fff; color: #000; border: none;
      font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 0.25em;
      padding: 13px; cursor: pointer; transition: opacity 0.2s;
    }
    .gate-btn:hover { opacity: 0.85; }

    /* CHAT VIEW */
    #chat-view { display: none; flex-direction: column; flex: 1; overflow: hidden; }

    .user-bar {
      border-bottom: 1px solid var(--border); padding: 9px 28px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; background: var(--surface);
    }

    .user-info { font-size: 9px; letter-spacing: 0.2em; color: var(--muted2); }
    .user-info span { color: #fff; }

    .change-btn {
      font-size: 8px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase;
      cursor: pointer; border: 1px solid var(--border); padding: 4px 10px;
      background: none; font-family: 'Space Mono', monospace; transition: color 0.2s, border-color 0.2s;
    }
    .change-btn:hover { color: #fff; border-color: #333; }

    .counter {
      padding: 6px 28px; font-size: 8px; letter-spacing: 0.3em;
      color: var(--muted); text-transform: uppercase;
      border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface);
    }

    /* MESSAGES */
    #messages {
      flex: 1; overflow-y: auto; padding: 20px 28px;
      display: flex; flex-direction: column; gap: 0;
    }
    #messages::-webkit-scrollbar { width: 2px; }
    #messages::-webkit-scrollbar-thumb { background: #222; }

    .msg {
      padding: 11px 0; border-bottom: 1px solid var(--border);
      animation: msgIn 0.2s ease both;
    }
    .msg:last-child { border-bottom: none; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
    .msg-author { font-size: 9px; letter-spacing: 0.2em; color: #fff; text-transform: uppercase; }
    .msg-author.me { color: #555; }
    .msg-time { font-size: 8px; letter-spacing: 0.15em; color: var(--muted); }
    .msg-text { font-size: 12px; color: #aaa; line-height: 1.7; word-break: break-word; letter-spacing: 0.03em; }

    .msg-system {
      padding: 6px 0;
      font-size: 9px; letter-spacing: 0.25em; color: #333;
      text-align: center; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
    }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.2em; color: #1e1e1e; }
    .empty-sub { font-size: 8px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); }

    /* STATUS BAR */
    .status-bar {
      font-size: 8px; letter-spacing: 0.3em; color: var(--muted);
      padding: 5px 28px; border-top: 1px solid var(--border);
      text-transform: uppercase; flex-shrink: 0; background: var(--surface);
    }
    .status-bar.connected { color: #2e7d32; }
    .status-bar.error { color: #c0392b; }

    /* INPUT */
    .input-wrap {
      border-top: 1px solid var(--border); padding: 14px 28px;
      display: flex; gap: 10px; flex-shrink: 0; background: var(--bg);
    }

    #msg-input {
      flex: 1; background: var(--input-bg); border: 1px solid var(--border2);
      color: #fff; font-family: 'Space Mono', monospace; font-size: 12px;
      padding: 11px 14px; outline: none; transition: border-color 0.2s;
      letter-spacing: 0.05em; resize: none; min-height: 42px; max-height: 120px;
      line-height: 1.5;
    }
    #msg-input::placeholder { color: var(--muted); }
    #msg-input:focus { border-color: #2e2e2e; }
    #msg-input:disabled { opacity: 0.4; }

    #send-btn {
      background: #fff; color: #000; border: none;
      font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.2em;
      padding: 0 18px; cursor: pointer; transition: opacity 0.2s; flex-shrink: 0;
    }
    #send-btn:hover { opacity: 0.8; }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    @media (max-width: 480px) {
      header, .user-bar, .counter, .input-wrap, #messages, .status-bar { padding-left: 18px; padding-right: 18px; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Balenciaga</div>
    <div class="header-right">
      <div class="live-dot"></div>
      Global Chat
    </div>
  </header>

  <!-- NAME GATE -->
  <div id="name-gate">
    <div class="gate-title">Enter The Chat</div>
    <div class="gate-sub">Pick a name to continue</div>
    <input class="gate-input" id="name-input" type="text" placeholder="Your name..." maxlength="24" autocomplete="off" spellcheck="false"/>
    <div class="gate-error" id="gate-error"></div>
    <button class="gate-btn" id="name-btn">Enter →</button>
  </div>

  <!-- CHAT -->
  <div id="chat-view">
    <div class="user-bar">
      <div class="user-info">Chatting as <span id="name-display"></span></div>
      <button class="change-btn" id="change-btn">Change Name</button>
    </div>
    <div class="counter" id="counter">0 / 60 messages</div>
    <div id="messages">
      <div class="empty" id="empty-state">
        <div class="empty-title">No Messages Yet</div>
        <div class="empty-sub">Be the first to say something</div>
      </div>
    </div>
    <div class="status-bar" id="status-bar">● connecting...</div>
    <div class="input-wrap">
      <textarea id="msg-input" placeholder="Type a message..." maxlength="400" rows="1" disabled></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

</div>

<script>
  const DB          = 'https://balenciaga-chat-default-rtdb.firebaseio.com';
  const PATH        = '/messages';
  const MAX         = 60;
  const POLL_MS     = 2500;

  // ── Cookie helpers ──
  function setCookie(k, v, days = 365) {
    document.cookie = `${k}=${encodeURIComponent(v)};expires=${new Date(Date.now()+days*864e5).toUTCString()};path=/;SameSite=Lax`;
  }
  function getCookie(k) {
    const m = document.cookie.match(new RegExp('(?:^|; )'+k.replace(/([.$?*|{}()[\]\\/+^])/g,'\\$1')+'=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  }

  // ── State ──
  let myName   = getCookie('blnc-name') || null;
  let seenKeys = new Set();
  let polling  = null;

  // ── DOM ──
  const nameGate    = document.getElementById('name-gate');
  const chatView    = document.getElementById('chat-view');
  const nameInput   = document.getElementById('name-input');
  const nameBtn     = document.getElementById('name-btn');
  const gateError   = document.getElementById('gate-error');
  const nameDisplay = document.getElementById('name-display');
  const changeBtn   = document.getElementById('change-btn');
  const messagesEl  = document.getElementById('messages');
  const emptyState  = document.getElementById('empty-state');
  const counterEl   = document.getElementById('counter');
  const msgInput    = document.getElementById('msg-input');
  const sendBtn     = document.getElementById('send-btn');
  const statusBar   = document.getElementById('status-bar');

  // ── Status ──
  function setStatus(msg, cls = '') {
    statusBar.textContent = '● ' + msg;
    statusBar.className = 'status-bar ' + cls;
  }

  // ── Name gate ──
  function validateName(n) {
    if (!n)         return 'Name cannot be empty.';
    if (n.length < 2) return 'At least 2 characters.';
    if (!/^[a-zA-Z0-9_.\- ]+$/.test(n)) return 'Letters, numbers, _ . - only.';
    return null;
  }

  async function enterChat(rawName) {
    const name = rawName.trim();
    const err  = validateName(name);
    if (err) { gateError.textContent = err; return; }
    gateError.textContent = '';

    const isNew = name !== myName;
    myName = name;
    setCookie('blnc-name', name);
    nameDisplay.textContent = name;
    nameGate.style.display  = 'none';
    chatView.style.display  = 'flex';
    unlock();

    if (isNew) await pushMsg({ type: 'system', text: `${name} joined the chat` });
  }

  nameBtn.onclick = () => enterChat(nameInput.value);
  nameInput.onkeydown = e => { if (e.key === 'Enter') enterChat(nameInput.value); };

  changeBtn.onclick = () => {
    lock();
    chatView.style.display = 'none';
    nameGate.style.display = 'flex';
    nameInput.value = myName || '';
    gateError.textContent = '';
    nameInput.focus();
  };

  function unlock() { msgInput.disabled = false; sendBtn.disabled = false; msgInput.focus(); }
  function lock()   { msgInput.disabled = true;  sendBtn.disabled = true; }

  // ── Helpers ──
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmtTime(ts) {
    const d = new Date(ts);
    const date = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    return `${date} ${time}`;
  }

  // ── Render one message ──
  function renderMsg(key, msg) {
    if (seenKeys.has(key)) return;
    seenKeys.add(key);

    emptyState.style.display = 'none';

    const div = document.createElement('div');

    if (msg.type === 'system') {
      div.className = 'msg-system';
      div.textContent = msg.text;
    } else {
      div.className = 'msg';
      const isMe = msg.name === myName;
      div.innerHTML = `
        <div class="msg-top">
          <span class="msg-author ${isMe ? 'me' : ''}">${esc(msg.name)}</span>
          <span class="msg-time">${fmtTime(msg.ts)}</span>
        </div>
        <div class="msg-text">${esc(msg.text)}</div>
      `;
    }

    messagesEl.appendChild(div);

    const nearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 120;
    if (nearBottom) messagesEl.scrollTop = messagesEl.scrollHeight;

    // update counter — count only chat messages (not system)
    const chatCount = messagesEl.querySelectorAll('.msg').length;
    counterEl.textContent = `${chatCount} / ${MAX} messages`;
  }

  // ── Firebase REST push ──
  async function pushMsg(msg) {
    try {
      const r = await fetch(`${DB}${PATH}.json`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...msg, ts: Date.now() })
      });
      if (!r.ok) throw new Error();
    } catch {
      setStatus('send failed — check connection', 'error');
    }
  }

  // ── Firebase REST poll ──
  async function poll() {
    try {
      // Fetch last 60 entries by key (no index needed)
      const r = await fetch(`${DB}${PATH}.json?limitToLast=${MAX}`);
      if (!r.ok) throw new Error();
      const data = await r.json();

      if (data) {
        Object.entries(data)
          .sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0))
          .forEach(([k, m]) => { if (m && m.ts) renderMsg(k, m); });
      }

      if (seenKeys.size === 0) {
        emptyState.style.display = 'flex';
      }

      setStatus('connected — live', 'connected');
    } catch {
      setStatus('connection error — retrying...', 'error');
    }
  }

  function startPolling() {
    poll();
    polling = setInterval(poll, POLL_MS);
  }

  // ── Send ──
  async function sendMessage() {
    if (!myName) return;
    const text = msgInput.value.trim();
    if (!text) return;
    msgInput.value = '';
    msgInput.style.height = 'auto';
    await pushMsg({ type: 'chat', name: myName, text });
    await poll(); // instant feedback
  }

  sendBtn.onclick = sendMessage;
  msgInput.onkeydown = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });

  // ── Boot ──
  startPolling();

  if (myName) {
    nameDisplay.textContent = myName;
    nameGate.style.display  = 'none';
    chatView.style.display  = 'flex';
    unlock();
  } else {
    nameInput.focus();
  }
</script>
</body>
</html>
