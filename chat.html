<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BALENCIAGA — Global Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050505;
      --surface: #0d0d0d;
      --border: #1e1e1e;
      --accent: #ffffff;
      --muted: #505050;
      --font-mono: 'Space Mono', monospace;
      --font-main: 'Space Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--accent); font-family: var(--font-mono); overflow: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.35;
    }

    /* ── Name gate modal ── */
    .name-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
    }
    .name-modal-overlay.hidden { display: none; }

    .name-modal {
      background: #0a0a0a;
      border: 1px solid #222;
      padding: 2.5rem 2rem;
      width: 90%; max-width: 360px;
      text-align: center;
      display: flex; flex-direction: column; gap: 1.2rem;
    }

    .name-modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: 0.2em;
      background: linear-gradient(180deg, #fff 20%, #555 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .name-modal p {
      font-size: 9px; letter-spacing: 0.4em; color: var(--muted); text-transform: uppercase;
    }

    .name-input {
      width: 100%;
      background: #080808; border: 1px solid #222;
      color: #fff; font-family: var(--font-mono); font-size: 13px;
      padding: 13px 16px; outline: none; text-align: center;
      transition: border-color 0.2s; letter-spacing: 0.1em;
    }
    .name-input:focus { border-color: #333; }
    .name-input::placeholder { color: #333; }

    .name-error {
      font-size: 9px; letter-spacing: 0.2em; color: #c0392b; min-height: 1em;
    }

    .name-submit-btn {
      width: 100%; background: #fff; color: #000; border: none;
      font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 0.25em;
      padding: 13px; cursor: pointer; transition: opacity 0.2s;
    }
    .name-submit-btn:hover { opacity: 0.85; }

    /* ── Navbar ── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .nav-container {
      padding: 0 40px;
      display: flex; align-items: center; justify-content: center;
      position: relative; height: 62px;
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif; font-size: 44px; letter-spacing: 0.22em;
      color: #fff; text-decoration: none;
    }
    .nav-links { display: flex; align-items: center; gap: 28px; position: absolute; right: 40px; }
    .nav-link {
      font-size: 9px; letter-spacing: 0.45em; color: var(--muted);
      text-decoration: none; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-link:hover { color: #fff; }

    /* ── Chat wrapper ── */
    .chat-wrapper {
      display: flex; flex-direction: column;
      height: 100vh; padding-top: 62px;
    }

    /* ── Chat header ── */
    .chat-header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0.7rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-header-left { display: flex; align-items: center; gap: 0.6rem; }
    .online-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #4caf50; box-shadow: 0 0 6px #4caf50;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .chat-title {
      font-size: 9px; letter-spacing: 0.45em; color: var(--muted); text-transform: uppercase;
    }
    .chat-username-badge {
      font-size: 9px; letter-spacing: 0.2em; color: var(--muted);
      border: 1px solid var(--border); padding: 4px 10px;
    }
    .chat-username-badge span { color: #fff; }
    .change-name-btn {
      font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.3em;
      color: var(--muted); text-transform: uppercase;
      background: none; border: 1px solid var(--border);
      padding: 4px 10px; cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    .change-name-btn:hover { color: #fff; border-color: #333; }

    /* ── Messages ── */
    .messages-area {
      flex: 1; overflow-y: auto;
      padding: 1.2rem 1.5rem;
      display: flex; flex-direction: column; gap: 0;
      scrollbar-width: thin; scrollbar-color: #1e1e1e transparent;
    }
    .messages-area::-webkit-scrollbar { width: 2px; }
    .messages-area::-webkit-scrollbar-thumb { background: #222; }

    .msg {
      padding: 11px 0; border-bottom: 1px solid var(--border);
      animation: msgIn 0.2s ease both;
    }
    .msg:last-child { border-bottom: none; }

    @keyframes msgIn {
      from { opacity:0; transform:translateY(5px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .msg-meta { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
    .msg-author { font-size: 9px; letter-spacing: 0.2em; color: #fff; text-transform: uppercase; }
    .msg-time { font-size: 8px; letter-spacing: 0.15em; color: var(--muted); }
    .msg-bubble {
      font-size: 12px; color: #aaa; line-height: 1.7;
      word-break: break-word; letter-spacing: 0.03em;
    }

    /* system messages */
    .msg.system-msg {
      padding: 5px 0; border-bottom: 1px solid var(--border);
      display: flex; justify-content: center;
    }
    .msg.system-msg .msg-bubble {
      font-size: 9px; letter-spacing: 0.25em; color: #2a2a2a; text-transform: uppercase;
    }

    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      flex: 1; user-select: none;
    }
    .empty-icon { font-size: 2rem; opacity: 0.1; }
    .empty-state span {
      font-size: 9px; letter-spacing: 0.4em; text-transform: uppercase; color: #1e1e1e;
    }

    /* ── Status bar ── */
    .status-bar {
      font-size: 8px; letter-spacing: 0.3em; text-transform: uppercase;
      padding: 5px 1.5rem; background: var(--surface);
      border-top: 1px solid var(--border);
      color: var(--muted); flex-shrink: 0;
    }
    .status-bar.connected { color: #2e7d32; }
    .status-bar.error     { color: #c0392b; }

    /* ── Input ── */
    .chat-input-area {
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 14px 1.5rem;
      display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
    }
    .chat-input {
      flex: 1; background: #080808; border: 1px solid #1e1e1e;
      color: #fff; font-family: var(--font-mono); font-size: 12px;
      padding: 11px 14px; outline: none; resize: none;
      min-height: 42px; max-height: 120px;
      transition: border-color 0.2s; letter-spacing: 0.05em; line-height: 1.5;
    }
    .chat-input:focus { border-color: #2e2e2e; }
    .chat-input::placeholder { color: var(--muted); }
    .chat-input:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-btn {
      background: #fff; color: #000; border: none;
      font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.2em;
      padding: 0 20px; height: 42px; cursor: pointer; transition: opacity 0.2s; flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.8; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .copyright {
      font-size: 8px; letter-spacing: 0.3em; color: #1a1a1a;
      text-transform: uppercase; text-align: center; padding: 6px;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .nav-container { padding: 0 18px; }
      .chat-header { padding: 0.6rem 1rem; }
      .messages-area { padding: 0.8rem; }
      .chat-input-area { padding: 10px; }
    }
  </style>
</head>
<body>

<!-- Name modal -->
<div class="name-modal-overlay" id="nameModal">
  <div class="name-modal">
    <h2>Enter The Chat</h2>
    <p>Pick a username to join the global chat. Saved in your browser.</p>
    <input class="name-input" id="nameInput" type="text" placeholder="Your name..." maxlength="24" autocomplete="off" spellcheck="false"/>
    <div class="name-error" id="nameError"></div>
    <button class="name-submit-btn" id="nameSubmit">Enter →</button>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">Balenciaga</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
    </div>
  </div>
</nav>

<!-- Chat UI -->
<div class="chat-wrapper">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="online-dot"></div>
      <span class="chat-title">Global Chat</span>
    </div>
    <div style="display:flex;align-items:center;gap:0.6rem;">
      <span class="chat-username-badge">chatting as <span id="usernameDisplay">—</span></span>
      <button class="change-name-btn" id="changeNameBtn">Change</button>
    </div>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">◆</div>
      <span id="emptyText">loading...</span>
    </div>
  </div>

  <div class="status-bar" id="statusBar">● connecting...</div>

  <div class="chat-input-area">
    <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1" maxlength="400" disabled></textarea>
    <button class="send-btn" id="sendBtn" disabled>Send</button>
  </div>
</div>

<div class="copyright">© 2026 Balenciaga — Season 01</div>

<script>
const DB            = 'https://exploiton-default-rtdb.firebaseio.com';
const PATH          = '/messages';
const POLL_INTERVAL = 2500;
const LOAD_LAST     = 60;

// ── Cookies ──
function setCookie(k,v,days=365){document.cookie=`${k}=${encodeURIComponent(v)};expires=${new Date(Date.now()+days*864e5).toUTCString()};path=/;SameSite=Lax`;}
function getCookie(k){const m=document.cookie.match(new RegExp('(?:^|; )'+k.replace(/([.$?*|{}()[\]\\/+^])/g,'\\$1')+'=([^;]*)'));return m?decodeURIComponent(m[1]):null;}

// ── State ──
let currentUser = getCookie('blnc-name') || null;
let seenKeys    = new Set();
let polling     = null;

// ── DOM ──
const nameModal   = document.getElementById('nameModal');
const nameInput   = document.getElementById('nameInput');
const nameSubmit  = document.getElementById('nameSubmit');
const nameError   = document.getElementById('nameError');
const msgArea     = document.getElementById('messagesArea');
const emptyState  = document.getElementById('emptyState');
const emptyText   = document.getElementById('emptyText');
const chatInput   = document.getElementById('chatInput');
const sendBtn     = document.getElementById('sendBtn');
const userDisplay = document.getElementById('usernameDisplay');
const changeBtn   = document.getElementById('changeNameBtn');
const statusBar   = document.getElementById('statusBar');

// ── Status ──
function setStatus(msg, cls=''){
  statusBar.textContent = '● '+msg;
  statusBar.className   = 'status-bar '+cls;
}

// ── Name modal ──
function openModal(){
  nameModal.classList.remove('hidden');
  nameInput.value=''; nameError.textContent='';
  setTimeout(()=>nameInput.focus(),80);
}
function closeModal(){ nameModal.classList.add('hidden'); }

function validateName(n){
  if(!n)          return 'Username cannot be empty.';
  if(n.length<2)  return 'At least 2 characters.';
  if(n.length>24) return 'Max 24 characters.';
  if(!/^[a-zA-Z0-9_.\-]+$/.test(n)) return 'Only letters, numbers, _ . - allowed.';
  return null;
}

async function submitName(){
  const val = nameInput.value.trim();
  const err = validateName(val);
  if(err){ nameError.textContent=err; return; }
  currentUser = val;
  setCookie('blnc-name', val);
  userDisplay.textContent = val;
  closeModal();
  unlock();
  await push({type:'system', text:`${val} joined the chat`});
}

nameSubmit.addEventListener('click', submitName);
nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') submitName(); });
changeBtn.addEventListener('click', ()=>{ lock(); openModal(); });

function unlock(){ chatInput.disabled=false; sendBtn.disabled=false; chatInput.focus(); }
function lock()  { chatInput.disabled=true;  sendBtn.disabled=true; }

// ── Helpers ──
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtTime(ts){
  const d = new Date(ts);
  return d.toLocaleDateString([],{month:'short',day:'numeric'}) + ' · ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

// ── Render one message ──
function renderMsg(key, msg){
  if(seenKeys.has(key)) return;
  seenKeys.add(key);

  emptyState.style.display = 'none';

  const div = document.createElement('div');

  if(msg.type === 'system'){
    div.className = 'msg system-msg';
    div.innerHTML = `<div class="msg-bubble">${esc(msg.text)}</div>`;
  } else {
    const author = msg.author || msg.name || 'unknown';
    div.className = 'msg';
    div.innerHTML = `
      <div class="msg-meta">
        <span class="msg-author">${esc(author)}</span>
        <span class="msg-time">${fmtTime(msg.ts)}</span>
      </div>
      <div class="msg-bubble">${esc(msg.text)}</div>`;
  }

  msgArea.appendChild(div);
  const nearBottom = msgArea.scrollHeight - msgArea.scrollTop - msgArea.clientHeight < 120;
  if(nearBottom) msgArea.scrollTop = msgArea.scrollHeight;
}

// ── Firebase push ──
async function push(msg){
  try {
    const r = await fetch(`${DB}${PATH}.json`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({...msg, ts:Date.now()})
    });
    if(!r.ok) throw new Error();
  } catch {
    setStatus('send failed — check connection','error');
  }
}

// ── Poll ──
async function poll(){
  try {
    const r = await fetch(`${DB}${PATH}.json?orderBy="ts"&limitToLast=${LOAD_LAST}`);
    if(!r.ok) throw new Error();
    const data = await r.json();
    if(data){
      Object.entries(data)
        .sort((a,b)=>a[1].ts-b[1].ts)
        .forEach(([k,m])=>{ if(m&&m.ts) renderMsg(k,m); });
    }
    if(seenKeys.size===0){
      emptyText.textContent='no messages yet. say something.';
      emptyState.style.display='flex';
    }
    setStatus('connected — live','connected');
  } catch {
    setStatus('connection error — retrying...','error');
  }
}

// ── Start polling ──
function startPolling(){
  poll();
  polling = setInterval(poll, POLL_INTERVAL);
}

// ── Send ──
async function sendMessage(){
  if(!currentUser){ openModal(); return; }
  const text = chatInput.value.trim();
  if(!text) return;
  chatInput.value='';
  chatInput.style.height='auto';
  await push({type:'chat', author:currentUser, text});
  await poll();
}

sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
});
chatInput.addEventListener('input', ()=>{
  chatInput.style.height='auto';
  chatInput.style.height=Math.min(chatInput.scrollHeight,120)+'px';
});

// ── Boot ──
startPolling();

if(currentUser){
  userDisplay.textContent = currentUser;
  closeModal();
  unlock();
} else {
  openModal();
}
</script>
</body>
</html>
