<!DOCTYPE html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/fnae@c9c8b513a27155bf37c4ab3dee74e99b12b895ba/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Five Nights at Big E — Balenciaga</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #back-btn {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 99999;
            font-family: monospace;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 14px;
            background: rgba(0,0,0,0.6);
            transition: color 0.2s, border-color 0.2s;
        }
        #back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
        #sidebarad1, #sidebarad2 { display: none; }
    </style>
</head>
<body>
    <a href="../index.html" id="back-btn">← Back</a>
    <div id="loading-text" style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;"> LOADING... </div>
    <div id="unity-container">
        <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>
    <script>
        var loadingText = document.querySelector("#loading-text");
        let loadedBytes = 0;

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            let chunks = [];
            let received = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                received += value.length;
                loadedBytes += value.length;
                chunks.push(value);
                let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
                loadingText.textContent = `LOADING... ${mbDone} MB / 155.84 MB`;
            }
            let fullBuffer = new Uint8Array(received);
            let offset = 0;
            for (let chunk of chunks) {
                fullBuffer.set(chunk, offset);
                offset += chunk.length;
            }
            return fullBuffer.buffer;
        }

        async function mergeFiles(fileParts) {
            const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
            const mergedBlob = new Blob(buffers);
            return URL.createObjectURL(mergedBlob);
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) parts.push(file + ".part" + i);
            return parts;
        }

        (async () => {
            const [dataUrl, wasmUrl, webm] = await Promise.all([
                mergeFiles(getParts("Build/fnae.data", 1, 3)),
                mergeFiles(getParts("Build/fnae.wasm", 1, 3)),
                mergeFiles(getParts("StreamingAssets/202512191935.webm", 1, 3)),
            ]);

            window.randomwebm = webm;
            const realSrc = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, "src");
            Object.defineProperty(HTMLMediaElement.prototype, "src", {
                set(value) {
                    if (typeof value === "string" && (value.includes("202512191935.mp4") || value.includes("202512191935.webm"))) {
                        value = window.randomwebm;
                    }
                    return realSrc.set.call(this, value);
                },
                get() { return realSrc.get.call(this); }
            });

            var canvas = document.querySelector("#unity-canvas");
            var loadingBar = document.querySelector("#unity-loading-bar");
            var progressBarFull = document.querySelector("#unity-progress-bar-full");

            var buildUrl = "Build";
            var loaderUrl = buildUrl + "/fnae.loader.js";
            var config = {
                arguments: [],
                dataUrl: dataUrl,
                frameworkUrl: buildUrl + "/fnae.framework.js",
                codeUrl: wasmUrl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "DefaultCompany",
                productName: "fnae",
                productVersion: "1.0",
            };

            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                var meta = document.createElement('meta');
                meta.name = 'viewport';
                meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
                document.getElementsByTagName('head')[0].appendChild(meta);
            }

            loadingBar.style.display = "block";
            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = 100 * progress + "%";
                }).then((unityInstance) => {
                    loadingBar.style.display = "none";
                    loadingText.remove();
                }).catch((message) => {});
            };
            document.body.appendChild(script);
        })();
    </script>
    <div id="sidebarad1"></div>
    <div id="sidebarad2"></div>
</body>
</html>
